name: Web3 Dynamic Triage Pipeline

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'URL del repositorio de Smart Contracts del cliente (GitHub)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dynamic-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Toolkit (Tu Repositorio)
        uses: actions/checkout@v4

      - name: Create Workspace & Clone Target Repo
        run: |
          mkdir -p raw_outputs
          mkdir -p target_workspace
          echo "[*] Clonando repositorio objetivo: ${{ github.event.inputs.target_repo }}"
          git clone ${{ github.event.inputs.target_repo }} target_workspace
          
      - name: Set up Node.js (Entorno de compilación)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Foundry (Forge/Cast)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # --- NUEVO: SISTEMA DE CACHÉ OPTIMIZADO PARA RUST/CARGO ---
      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            /home/runner/.cargo/bin/aderyn
          key: ${{ runner.os }}-cargo-aderyn-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-aderyn-

      - name: Set up Rust Environment
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Aderyn (Utiliza Caché si existe)
        run: |
          if command -v aderyn &> /dev/null; then
            echo "[+] Aderyn ya está instalado (Restaurado desde Caché)."
          else
            echo "[*] Instalando Aderyn desde Crates.io..."
            cargo install aderyn
          fi

      # --- ENTORNO DE CONTROL ANIDADO COMO PROYECTO FOUNDRY ---
      #- name: Create Isolated Sandbox & Vulnerable Contract
      #  run: |
      #    # Nos movemos un nivel arriba y creamos una estructura real de Foundry
      #    cd ..
      #    mkdir -p sandbox
      #    cd sandbox
          
          # Inicializamos un proyecto vacío de Forge sin hacer commits de git
      #    forge init --no-commit --no-git --force
          
          # Limpiamos los contratos de ejemplo que genera forge por defecto
      #    rm -f src/Counter.sol test/Counter.t.sol script/Counter.s.sol
          
          # Inyectamos nuestro honeypot de control en la ruta correcta del framework
      #    cat << 'EOF' > src/VulnerableControl.sol
      #    // SPDX-License-Identifier: MIT
      #    pragma solidity ^0.8.0;

      #    contract VulnerableControl {
      #        mapping(address => uint) public balances;
      #        address public owner;

      #        constructor() {
      #            owner = msg.sender;
      #        }

      #        function withdraw(uint _amount) public {
      #            require(balances[msg.sender] >= _amount);
      #            (bool success, ) = msg.sender.call{value: _amount}("");
      #            require(success);
      #            balances[msg.sender] -= _amount;
      #        }

      #        function transferOwnership(address _newOwner) public {
      #            require(tx.origin == owner);
      #            owner = _newOwner;
      #        }
      #    }
      #    EOF
          
          # Forzamos una compilación previa para verificar que el entorno funciona
      #    forge build

      - name: Install Python & Solc-Select
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Ejecución de Slither apuntando al proyecto Foundry estructurado
      - name: Run Slither Static Analysis
        run: |
          pip install slither-analyzer
          
          # Forzamos a solc-select a instalar y usar la versión exacta del contrato
          pip install solc-select
          solc-select install 0.8.20 || true
          solc-select use 0.8.20 || true
          
          #cd ../sandbox
          # Nos paramos directamente en el repositorio clonado del cliente
          cd ${{ github.workspace }}/target_workspace
          
          # Limpiamos artefactos previos de Forge para obligar una recompilación limpia dentro de Slither
          forge clean
          
          # Ejecutamos Slither con rutas absolutas nativas
          # Agregamos '--sarif' temporalmente además del JSON como respaldo por si el formateador JSON nativo se corrompe
          slither . --json ${{ github.workspace }}/raw_outputs/slither_raw.json --fail-none
          
          # Verificación de emergencia: Si por alguna razón el JSON quedó vacío, forzamos su escritura cruda
          if [ ! -s "${{ github.workspace }}/raw_outputs/slither_raw.json" ] || [ "$(cat ${{ github.workspace }}/raw_outputs/slither_raw.json)" = "[]" ]; then
            echo "[!] Alerta: Slither no escribió el JSON automáticamente. Forzando exportación manual..."
            slither . --json ${{ github.workspace }}/raw_outputs/slither_raw.json --skip-pylint --fail-none || true
          fi
          
      # Ejecución de Aderyn apuntando a la raíz del proyecto Foundry estructurado
      - name: Run Aderyn AST Scanner
        run: |
          echo "[*] Ejecutando escaneo en la estructura Foundry del Sandbox..."
          #cd ../sandbox
          # Apuntamos Aderyn directamente a la carpeta del cliente
          cd ${{ github.workspace }}/target_workspace
          aderyn || echo "[!] Aderyn falló en la ejecución"

          # Movemos el reporte generado a la carpeta de artefactos final
          if [ -f report.md ]; then
            mv report.md ${{ github.workspace }}/raw_outputs/aderyn_report.md
          else
            echo "# Aderyn no pudo generar el reporte" > ${{ github.workspace }}/raw_outputs/aderyn_report.md
          fi

          
      - name: Run Custom Parsers
        run: |
          echo "[*] Buscando 'json_cleaner.py' dinámicamente en el espacio de trabajo..."
          
          # Buscamos el archivo en todo el workspace clonado
          PARSER_PATH=$(find ${{ github.workspace }} -name "json_cleaner.py" | head -n 1)
          
          if [ -n "$PARSER_PATH" ]; then
            echo "[+] Parser encontrado en: $PARSER_PATH"
            echo "[*] Ejecutando limpiador..."
            python "$PARSER_PATH"
          else
            echo "[!] ERROR: No se encontró 'json_cleaner.py' en ninguna carpeta del repositorio."
            echo "[*] Estructura actual del workspace para auditoría:"
            ls -R ${{ github.workspace }}
          fi	
        continue-on-error: true
       

      - name: Upload Triage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web3-audit-report
          path: raw_outputs/
          retention-days: 5
